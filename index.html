<!DOCTYPE html>
<!-- v3.3 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="version" content="v3.3">
<title>Scholia — Academic Editor</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='10' fill='%23221c17'/><path d='M44 12 L52 20 L26 46 L18 46 L18 38 Z' fill='%23c9a86a'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #f4ecd8;
    --paper-edge:   #e8dfc8;
    --ink:          #1f1a14;
    --ink-soft:     #4a4036;
    --ink-faint:    #8a7d6c;

    --c-tilde:    #b8627a;
    --c-asterisk: #6d4a8a;
    --c-at:       #3a4a8a;
    --c-dollar:   #b8861b;
    --c-percent:  #6b7a3a;

    --c-tilde-bg:    rgba(184,98,122,0.08);
    --c-asterisk-bg: rgba(109,74,138,0.08);
    --c-at-bg:       rgba(58,74,138,0.08);
    --c-dollar-bg:   rgba(184,134,27,0.09);
    --c-percent-bg:  rgba(107,122,58,0.09);

    --c-caret:    #8a7d6c;
    --c-amp:      #8a5a2b;
    --c-dashes:   #a04a3a;
    --c-code:     #2d6e6b;
    --c-bracket:  #3d4a6b;

    --c-caret-bg:   rgba(138,125,108,0.08);
    --c-amp-bg:     rgba(138,90,43,0.08);
    --c-dashes-bg:  rgba(160,74,58,0.08);
    --c-code-bg:    rgba(45,110,107,0.08);
    --c-bracket-bg: rgba(61,74,107,0.07);

    --header:     #2a2218;

    --chrome-bg:    #2a2520;
    --chrome-fg:    #d8cdb8;
    --chrome-accent:#c9a86a;
    --rule:         #cbbfa3;

    --editor-size: 23px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at top, #3a312a 0%, #221c17 60%, #181410 100%);
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--ink);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.035;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: overlay;
  }

  .chrome {
    position: fixed; top: 0; left: 0; right: 0;
    height: 52px;
    background: linear-gradient(180deg, #322b24, #251f1a);
    border-bottom: 1px solid #0c0a08;
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 6px 18px rgba(0,0,0,0.4);
    display: flex; align-items: center;
    padding: 0 22px; gap: 18px;
    z-index: 50;
    font-family: 'Inter', sans-serif;
    color: var(--chrome-fg);
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--chrome-accent);
    margin-right: 6px;
  }
  .brand .dot { color: #8b6f3a; margin: 0 4px; }

  .toolbar { display: flex; gap: 4px; align-items: center; flex-wrap: nowrap; }

  .tb-btn {
    background: transparent;
    color: var(--chrome-fg);
    border: 1px solid transparent;
    border-radius: 4px;
    min-width: 30px; height: 30px;
    padding: 0 8px;
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 120ms ease;
    white-space: nowrap;
  }
  .tb-btn:hover {
    background: rgba(201, 168, 106, 0.12);
    border-color: rgba(201, 168, 106, 0.3);
    color: var(--chrome-accent);
  }
  .tb-btn.active {
    background: rgba(201, 168, 106, 0.22);
    border-color: rgba(201, 168, 106, 0.45);
    color: var(--chrome-accent);
  }
  .tb-btn b { font-weight: 700; }
  .tb-btn i { font-style: italic; }
  .tb-btn u { text-decoration: underline; text-underline-offset: 2px; }
  .tb-btn.icon { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; }

  .tb-sep {
    width: 1px; height: 22px;
    background: rgba(216, 205, 184, 0.15);
    margin: 0 6px;
  }

  .size-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(216, 205, 184, 0.75);
    min-width: 32px;
    text-align: center;
    letter-spacing: 0.04em;
  }

  .legend {
    display: flex; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(216, 205, 184, 0.5);
  }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .legend .swatch {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
  }

  .tabbar {
    position: fixed; top: 52px; left: 0; right: 0;
    height: 34px;
    background: #1e1a16;
    border-bottom: 1px solid #0c0a08;
    display: flex; align-items: flex-end;
    padding: 0 16px; gap: 2px;
    z-index: 49;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    overflow-x: auto; overflow-y: hidden;
  }
  .tabbar::-webkit-scrollbar { height: 0; }

  .tab {
    display: inline-flex; align-items: center;
    height: 28px;
    padding: 0 14px;
    border-radius: 4px 4px 0 0;
    background: transparent;
    color: rgba(216,205,184,0.45);
    cursor: pointer;
    user-select: none;
    border: 1px solid transparent;
    border-bottom: none;
    position: relative;
    top: 1px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 100ms, color 100ms;
  }
  .tab:hover { background: rgba(201,168,106,0.08); color: rgba(216,205,184,0.75); }
  .tab.active {
    background: var(--paper);
    color: var(--ink);
    border-color: #0c0a08;
    font-weight: 500;
  }

  .tab-name {
    overflow: hidden; text-overflow: ellipsis; max-width: 130px;
  }
  .tab-name-input {
    background: transparent; border: none; outline: none;
    color: inherit; font: inherit;
    width: 100px; min-width: 40px;
  }

  .tab-add {
    height: 22px; min-width: 22px;
    border-radius: 3px;
    background: transparent;
    border: 1px solid transparent;
    color: rgba(216,205,184,0.4);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 16px; line-height: 1;
    align-self: center;
    margin-left: 4px; flex-shrink: 0;
  }
  .tab-add:hover {
    background: rgba(201,168,106,0.12);
    border-color: rgba(201,168,106,0.3);
    color: var(--chrome-accent);
  }

  .stage {
    position: absolute;
    top: 86px; bottom: 28px; left: 0; right: 0;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .page {
    width: 100%;
    min-height: 100%;
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(255,250,235,0.5), transparent 60%),
      radial-gradient(ellipse at 85% 90%, rgba(180,150,100,0.08), transparent 60%);
    box-shadow:
      0 1px 0 var(--paper-edge) inset,
      0 -1px 0 rgba(0,0,0,0.06) inset;
    padding: 40px 56px 80px;
    position: relative;
  }

  .page::before {
    content: '';
    position: absolute;
    top: 18px; left: 56px; right: 56px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rule) 20%, var(--rule) 80%, transparent);
    opacity: 0.5;
  }

  #editor {
    outline: none;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: var(--editor-size);
    line-height: 1.7;
    color: var(--ink);
    min-height: 70vh;
    white-space: pre-wrap;
    word-wrap: break-word;
    caret-color: var(--ink);
    -webkit-font-feature-settings: "kern", "liga", "onum";
    font-feature-settings: "kern", "liga", "onum";
  }

  #editor::selection,
  #editor *::selection {
    background: rgba(201, 168, 106, 0.45);
    color: var(--ink);
  }

  #editor > div {
    padding-left: calc(var(--indent, 0) * 2.2em);
    min-height: 1.7em;
    position: relative;
  }

  /* ====== Headers ====== */
  .h1, .h2, .h3, .h4, .h5 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--header);
    line-height: 1.3;
    display: inline;
  }
  .h1 { font-size: 1.85em; font-weight: 600; letter-spacing: -0.01em; }
  .h2 { font-size: 1.45em; font-weight: 600; }
  .h3 { font-size: 1.2em;  font-weight: 600; font-style: italic; color: var(--ink-soft); }
  .h4 { font-size: 1.05em; font-weight: 600; color: var(--ink-soft); }
  .h5 { font-size: 1em;    font-weight: 500; font-style: italic; color: var(--ink-faint); }

  div.line-h1 { margin-top: 0.6em; margin-bottom: 0.2em; }
  div.line-h2 { margin-top: 0.4em; margin-bottom: 0.1em; }
  div.line-h3 { margin-top: 0.3em; }
  div.line-h4 { margin-top: 0.2em; }
  div.line-h5 { margin-top: 0.15em; }

  /* Header marker — visible only when caret is on the header line */
  .h-mark {
    display: none;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
    font-size: 0.5em;
    margin-right: 0.35em;
    vertical-align: 0.18em;
  }
  div.line-h.raw .h-mark { display: inline; }

  /* ====== Comments ====== */
  .cmt {
    padding: 0 4px;
    border-radius: 3px;
  }
  .cmt-tilde    { color: var(--c-tilde);    background: var(--c-tilde-bg); }
  .cmt-asterisk { color: var(--c-asterisk); background: var(--c-asterisk-bg); }
  .cmt-at       { color: var(--c-at);       background: var(--c-at-bg); }
  .cmt-dollar  { color: var(--c-dollar);  background: var(--c-dollar-bg); }
  .cmt-percent { color: var(--c-percent); background: var(--c-percent-bg); }

  .cmt-caret {
    color: var(--c-caret); background: var(--c-caret-bg);
    font-size: 0.82em;
    vertical-align: 0.18em;
  }
  .cmt-amp {
    color: var(--c-amp); background: var(--c-amp-bg);
    font-variant: small-caps;
    letter-spacing: 0.04em;
  }
  .cmt-dashes {
    color: var(--c-dashes); background: var(--c-dashes-bg);
    text-decoration: line-through;
    text-decoration-color: rgba(160, 74, 58, 0.5);
  }
  .cmt-code {
    color: var(--c-code); background: var(--c-code-bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9em;
  }
  .cmt-bracket {
    color: var(--c-bracket); background: var(--c-bracket-bg);
  }

  /* ====== Markers ======
     Default rule: COLLAPSED (display: none). Markers reappear faded
     when:
       - the comment is OPEN (no closer yet) — opener marker shown
       - the caret is INSIDE the comment span — both markers shown faded
     Bracket markers always visible (special case). */
  .marker {
    display: none;
    color: inherit;
    opacity: 0.45;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82em;
    font-weight: 500;
  }
  /* Opener visible when comment is open OR caret inside */
  .cmt.open > .marker.marker-open,
  .cmt.raw  > .marker {
    display: inline;
  }
  .cmt-bracket > .marker {
    display: inline;
    opacity: 0.7;
    font-family: inherit;
    font-size: inherit;
  }
  .cmt-bracket.raw > .marker { opacity: 1; }

  /* Markdown formatting markers — ALWAYS hidden (per spec) */
  .md-mark { display: none; }
  .md-bold      { font-weight: 700; }
  .md-italic    { font-style: italic; }
  .md-underline { text-decoration: underline; text-underline-offset: 2px; }

  /* Lists */
  .bullet, .num {
    display: inline-block;
    color: var(--ink-soft);
    margin-right: 0.5em;
    font-weight: 500;
    user-select: none;
  }
  .num { min-width: 1.5em; text-align: right; }

  /* Arrows */
  .arrow {
    display: inline-block;
    font-family: 'EB Garamond', serif;
    font-weight: 500;
    color: var(--ink-soft);
    padding: 0 1px;
  }

  .status {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 28px;
    background: linear-gradient(180deg, #251f1a, #1a1612);
    border-top: 1px solid #0c0a08;
    color: rgba(216, 205, 184, 0.55);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    display: flex; align-items: center;
    padding: 0 22px; gap: 18px;
    z-index: 50;
  }
  .status .ind { color: var(--chrome-accent); }

  #editor:empty::before,
  #editor > div:only-child:empty::before {
    content: attr(data-placeholder);
    color: var(--ink-faint);
    font-style: italic;
    pointer-events: none;
  }

  .stage::-webkit-scrollbar { width: 10px; }
  .stage::-webkit-scrollbar-track { background: transparent; }
  .stage::-webkit-scrollbar-thumb {
    background: rgba(201, 168, 106, 0.2);
    border-radius: 5px;
  }
  .stage::-webkit-scrollbar-thumb:hover { background: rgba(201, 168, 106, 0.35); }
</style>
</head>
<body>

<div class="chrome">
  <div class="brand">Scholia<span class="dot">·</span></div>
  <div class="toolbar" id="toolbar">
    <button class="tb-btn" data-fmt="bold" title="Bold (Ctrl+B)"><b>B</b></button>
    <button class="tb-btn" data-fmt="italic" title="Italic (Ctrl+I)"><i>I</i></button>
    <button class="tb-btn" data-fmt="underline" title="Underline (Ctrl+U)"><u>U</u></button>
    <div class="tb-sep"></div>
    <button class="tb-btn icon" data-action="undo" title="Undo (Ctrl+Z)">↶</button>
    <button class="tb-btn icon" data-action="redo" title="Redo (Ctrl+Y / Ctrl+Shift+Z)">↷</button>
    <div class="tb-sep"></div>
    <button class="tb-btn icon" data-action="size-down" title="Decrease font size (Ctrl+−)">A−</button>
    <span class="size-display" id="size-display">18</span>
    <button class="tb-btn icon" data-action="size-up" title="Increase font size (Ctrl+=)">A+</button>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:4px">
    <button class="tb-btn icon" data-action="export" title="Download backup (export JSON)">↓</button>
    <button class="tb-btn icon" data-action="import" title="Restore from backup (import JSON)">↑</button>
    <input type="file" id="import-input" accept=".json" style="display:none">
    <div class="tb-sep" style="margin:0 8px"></div>
    <div class="legend" style="margin-left:0">
      <span><span class="swatch" style="background:var(--c-tilde)"></span>~</span>
      <span><span class="swatch" style="background:var(--c-asterisk)"></span>*</span>
      <span><span class="swatch" style="background:var(--c-at)"></span>@</span>
      <span><span class="swatch" style="background:var(--c-dollar)"></span>$</span>
      <span><span class="swatch" style="background:var(--c-percent)"></span>%</span>
    </div>
  </div>
</div>

<div class="tabbar" id="tabbar"></div>

<div class="stage">
  <div class="page">
    <div id="editor" contenteditable="true" spellcheck="true" data-placeholder="Begin writing. Comments: ~ ! @ $ % ^ & -- /* */ [ ]. Headers: # ## ### #### #####. Close headers with Tab, Enter, or #."></div>
  </div>
</div>

<div class="status">
  <span>indent: <span class="ind" id="st-indent">0</span></span>
  <span>line: <span class="ind" id="st-line">1</span></span>
  <span style="margin-left:auto">⇥ closes / nests / indents · ↵ closes all open spans · ⇧↵ line break, no close · -&gt; → → · - → •</span>
  <span style="margin-left:18px;color:var(--chrome-accent)">v3.3</span>
</div>

<script>
/* =====================================================================
   SCHOLIA — Academic Editor v3.3
   ---------------------------------------------------------------------
   PRINCIPLE
   ---------
   Source-of-truth: each line div's textContent is the raw source string.
   Bold/italic/underline stored as <b>x</b>, <i>x</i>, <u>x</u>.
   Tag markers are wrapped in hidden .md-mark spans (always invisible).
   Markers are display:none; <i> has no markers.

   Comments and headers are "spans" with an opener and closer.
   - While a span is OPEN (no closer), the opener is visible (faded).
   - When CLOSED, the opener hides (and stays hidden) unless the caret
     re-enters that span.
   - Any opener typed mid-span auto-closes the current and starts a new
     one. We render this as: existing-content [closer] [space] [new opener].
     User types `@hello!` and the source becomes `@hello@ !`. Visually:
     [@hello] [!] (space between).
   - Tab → inserts closers for any open spans on the current line, at
     the caret position.
   - Enter (paragraph) → inserts closers for any open spans, then splits.
   - Shift+Enter (line break) → inserts a newline within the SAME line
     div without auto-closing. (We model this as a literal \n in the
     source string. Render-time, \n becomes <br>.)
   - Bracket [ ] is special: markers ALWAYS visible. Inside brackets,
     other comments may nest. Brackets close on ].
   ===================================================================== */

const editor = document.getElementById('editor');
const stage = document.querySelector('.stage');
const stIndent = document.getElementById('st-indent');
const stLine = document.getElementById('st-line');
const sizeDisplay = document.getElementById('size-display');

/* ---------- Font size ---------- */
const SIZE_MIN = 23, SIZE_MAX = 43, SIZE_STEP = 1;
const SIZE_DISPLAY_OFFSET = 11; // 23px displays as "12"
let editorSize = 23;
function applyFontSize() {
  document.documentElement.style.setProperty('--editor-size', editorSize + 'px');
  sizeDisplay.textContent = String(editorSize - SIZE_DISPLAY_OFFSET);
}
function bumpFontSize(d) {
  editorSize = Math.max(SIZE_MIN, Math.min(SIZE_MAX, editorSize + d));
  applyFontSize();
}
applyFontSize();

/* ---------- Initial line ---------- */
function ensureLine() {
  if (editor.children.length === 0) {
    const d = document.createElement('div');
    d.setAttribute('data-indent', '0');
    d.style.setProperty('--indent', '0');
    d.appendChild(document.createElement('br'));
    editor.appendChild(d);
  }
}
ensureLine();

/* ---------- Caret utilities ---------- */
function getLineDiv(node) {
  while (node && node !== editor) {
    if (node.parentNode === editor) return node;
    node = node.parentNode;
  }
  return null;
}

function getCaretOffsetInLine(lineDiv) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return 0;
  const range = sel.getRangeAt(0);
  if (!lineDiv.contains(range.startContainer) && lineDiv !== range.startContainer) return 0;
  const pre = range.cloneRange();
  pre.selectNodeContents(lineDiv);
  pre.setEnd(range.startContainer, range.startOffset);
  return pre.toString().length;
}

function setCaretOffsetInLine(lineDiv, offset) {
  const sel = window.getSelection();
  const range = document.createRange();
  let remaining = offset;
  let found = false;
  function walk(node) {
    if (found) return;
    if (node.nodeType === Node.TEXT_NODE) {
      const len = node.nodeValue.length;
      if (remaining <= len) {
        range.setStart(node, remaining);
        range.collapse(true);
        found = true;
        return;
      }
      remaining -= len;
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      if (node.tagName === 'BR') {
        // br counts as 1 character (the \n in source)
        if (remaining === 0) {
          range.setStartBefore(node);
          range.collapse(true);
          found = true;
          return;
        }
        remaining -= 1;
        return;
      }
      for (const child of node.childNodes) {
        walk(child);
        if (found) return;
      }
    }
  }
  walk(lineDiv);
  if (!found) {
    range.selectNodeContents(lineDiv);
    range.collapse(false);
  }
  sel.removeAllRanges();
  sel.addRange(range);
}

/* Source-of-truth: textContent BUT we need to preserve \n for shift+enter
   line breaks. textContent serializes <br> as nothing, so we use a custom
   walker. */
function getLineSource(lineDiv) {
  let out = '';
  function walk(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      out += node.nodeValue;
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      if (node.tagName === 'BR') { out += '\n'; return; }
      for (const c of node.childNodes) walk(c);
    }
  }
  walk(lineDiv);
  return out;
}

/* ---------- Comment registry ---------- */
const SINGLE_CHAR_COMMENTS = [
  { ch: '~', cls: 'cmt-tilde' },
  { ch: '*', cls: 'cmt-asterisk' },
  { ch: '@', cls: 'cmt-at' },
  { ch: '$', cls: 'cmt-dollar' },
  { ch: '%', cls: 'cmt-percent' },
  { ch: '^', cls: 'cmt-caret' },
  { ch: '&', cls: 'cmt-amp' }
];
const SINGLE_CHAR_SET = new Set(SINGLE_CHAR_COMMENTS.map(c => c.ch));
function clsForSingleChar(ch) {
  const c = SINGLE_CHAR_COMMENTS.find(x => x.ch === ch);
  return c ? c.cls : null;
}

/* Detect an opener at position i in src. Returns {len, kind, ch?, cls}. */
function openerAt(src, i) {
  const c = src[i];
  if (SINGLE_CHAR_SET.has(c)) {
    if (c === '*' && src[i+1] === '*') return null; // ** is bold, not a * comment

    const _sel = window.getSelection();
    if (_sel.rangeCount && _sel.isCollapsed) {
      const _ld = getLineDiv(_sel.getRangeAt(0).startContainer);
      if (_ld && _ld.classList.contains('line-h')) {
        const _src = getLineSource(_ld);
        const _car = getCaretOffsetInLine(_ld);
        const _hdr = detectHeader(_src);
        if (_hdr && _hdr.contentEnd === _src.length && _car === _src.length) {
          e.preventDefault();
          flushTypingSnapshot();
          setLineSource(_ld, _src + ' #');
          const _nl = document.createElement('div');
          setIndent(_nl, getIndent(_ld));
          setLineSource(_nl, '');
          _ld.after(_nl);
          setCaretOffsetInLine(_nl, 0);
          renderAll();
          pushUndo();
          return;
        }
      }
    }
  }

  // Tab / Shift+Tab
  if (e.key === 'Tab') {
    e.preventDefault();
    flushTypingSnapshot();
    const sel = window.getSelection();
    if (!sel.rangeCount) return;

    // Multi-line selection: indent every selected line
    if (!sel.isCollapsed) {
      const range = sel.getRangeAt(0);
      const startLine = getLineDiv(range.startContainer);
      const endLine = getLineDiv(range.endContainer);
      if (startLine && endLine) {
        const lines = [];
        let node = startLine;
        while (node) {
          lines.push(node);
          if (node === endLine) break;
          node = node.nextElementSibling;
        }
        lines.forEach(l => setIndent(l, getIndent(l) + (e.shiftKey ? -1 : 1)));
        pushUndo();
        updateStatus();
        return;
      }
    }

    // Collapsed: priority — open span close, then bullet nest, then indent
    const lineDiv = getLineDiv(sel.getRangeAt(0).startContainer);
    if (!lineDiv) return;
    const src = getLineSource(lineDiv);
    const caret = getCaretOffsetInLine(lineDiv);
    const opens = unclosedOpeners(src, caret).filter(o => o.opener.kind !== 'code');
    if (opens.length > 0 && !e.shiftKey) {
      // Insert closer for the innermost open span at caret, then a space
      // so the caret lands outside the span (keeping markers hidden).
      const innermost = opens[opens.length - 1];
      const closer = innermost.opener.close;
      const needsSpace = src[caret] !== ' ';
      const newSrc = src.slice(0, caret) + closer + (needsSpace ? ' ' : '') + src.slice(caret);
      setLineSource(lineDiv, newSrc);
      renderAll();
      setCaretOffsetInLine(lineDiv, caret + closer.length + (needsSpace ? 1 : 0));
      renderAll();
      pushUndo();
      return;
    }
    if (isBulletChar(src[0]) && src[1] === ' ') {
      nestBullet(lineDiv, !e.shiftKey);
      renderAll();
      pushUndo();
      return;
    }
    if (lineDiv.classList.contains('line-h') && !e.shiftKey) {
      const hdr = detectHeader(src);
      if (hdr) {
        if (hdr.contentEnd === src.length) setLineSource(lineDiv, src + ' #');
        const newLine = document.createElement('div');
        setIndent(newLine, getIndent(lineDiv));
        setLineSource(newLine, '');
        lineDiv.after(newLine);
        setCaretOffsetInLine(newLine, 0);
        renderAll();
        pushUndo();
        return;
      }
    }
    setIndent(lineDiv, getIndent(lineDiv) + (e.shiftKey ? -1 : 1));
    pushUndo();
    updateStatus();
    return;
  }

  // Enter (paragraph break) — close all open spans first, then split
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    flushTypingSnapshot();
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    if (!sel.isCollapsed) deleteSelectionRange();
    const range = window.getSelection().getRangeAt(0);
    const lineDiv = getLineDiv(range.startContainer);
    if (!lineDiv) return;

    const src = getLineSource(lineDiv);
    const caret = getCaretOffsetInLine(lineDiv);

    // Inside a multi-line /* ... */ code block: just split the line.
    // Don't insert closers; don't apply header/list continuation.
    const inCodeAtCaret = lineDiv.classList.contains('line-in-code')
      || endsInCodeBlock(src.slice(0, caret), false);
    if (inCodeAtCaret) {
      const before = src.slice(0, caret);
      const after = src.slice(caret);
      setLineSource(lineDiv, before);
      const newLine = document.createElement('div');
      setIndent(newLine, getIndent(lineDiv));
      setLineSource(newLine, after);
      lineDiv.after(newLine);
      setCaretOffsetInLine(newLine, 0);
      renderAll();
      pushUndo();
      return;
    }

    // Header: Enter closes the header and drops to a fresh line
    {
      const hdr = detectHeader(src);
      if (hdr) {
        if (hdr.contentEnd === src.length) setLineSource(lineDiv, src + ' #');
        const newLine = document.createElement('div');
        setIndent(newLine, getIndent(lineDiv));
        setLineSource(newLine, '');
        lineDiv.after(newLine);
        setCaretOffsetInLine(newLine, 0);
        renderAll();
        pushUndo();
        return;
      }
    }

    // Close all open spans at caret position by inserting their closers
    // (innermost first). Skip /* code blocks — they persist across lines.
    const opens = unclosedOpeners(src, caret);
    let closerStr = '';
    for (let i = opens.length - 1; i >= 0; i--) {
      if (opens[i].opener.kind === 'code') continue;
      closerStr += opens[i].opener.close;
    }

    let before = src.slice(0, caret) + closerStr;
    let after = src.slice(caret);

    // List continuation: bullet/numbered prefix carries to next line
    let nextLineSrc = after;
    let extraCaret = 0;
    if (isBulletChar(src[0]) && src[1] === ' ') {
      if (src.slice(2) === '' && caret === src.length) {
        // empty bullet line + Enter → clear bullet, end list
        setLineSource(lineDiv, '');
        renderAll();
        pushUndo();
        return;
      }
      if (caret >= 2) {
        nextLineSrc = src[0] + ' ' + after;
        extraCaret = 2;
      }
    } else {
      const nm = src.match(NUM_PREFIX_RE);
      if (nm) {
        if (src.slice(nm[0].length) === '' && caret === src.length) {
          setLineSource(lineDiv, '');
          renderAll();
          pushUndo();
          return;
        }
        if (caret >= nm[0].length) {
          let next = nm[1];
          if (/^\d+$/.test(next)) next = String(parseInt(next, 10) + 1);
          nextLineSrc = next + '. ' + after;
          extraCaret = next.length + 2;
        }
      }
    }

    setLineSource(lineDiv, before);
    const newLine = document.createElement('div');
    setIndent(newLine, getIndent(lineDiv));
    setLineSource(newLine, nextLineSrc);
    lineDiv.after(newLine);
    setCaretOffsetInLine(newLine, extraCaret);
    renderAll();
    pushUndo();
    return;
  }

  // Shift+Enter (line break, no close) — insert \n in source
  if (e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    flushTypingSnapshot();
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    if (!sel.isCollapsed) deleteSelectionRange();
    const range = window.getSelection().getRangeAt(0);
    const lineDiv = getLineDiv(range.startContainer);
    if (!lineDiv) return;
    const caret = getCaretOffsetInLine(lineDiv);
    const src = getLineSource(lineDiv);
    setLineSource(lineDiv, src.slice(0, caret) + '\n' + src.slice(caret));
    renderAll();
    setCaretOffsetInLine(lineDiv, caret + 1);
    renderAll();
    pushUndo();
    return;
  }

  // Backspace
  if (e.key === 'Backspace') {
    const sel = window.getSelection();
    if (sel.rangeCount && sel.isCollapsed) {
      const range = sel.getRangeAt(0);
      const lineDiv = getLineDiv(range.startContainer);
      if (lineDiv) {
        const caret = getCaretOffsetInLine(lineDiv);
        if (caret === 0) {
          const cur = getIndent(lineDiv);
          if (cur > 0) {
            e.preventDefault();
            flushTypingSnapshot();
            setIndent(lineDiv, cur - 1);
            pushUndo();
            updateStatus();
            return;
          }
          const prev = lineDiv.previousElementSibling;
          if (prev) {
            e.preventDefault();
            flushTypingSnapshot();
            const prevSrc = getLineSource(prev);
            const curSrc = getLineSource(lineDiv);
            const merged = prevSrc + curSrc;
            setLineSource(prev, merged);
            lineDiv.remove();
            renderAll();
            setCaretOffsetInLine(prev, prevSrc.length);
            renderAll();
            pushUndo();
            return;
          }
        }
        const src = getLineSource(lineDiv);
        // Atomic-delete bullet "• " at line start
        if (caret >= 2 && isBulletChar(src[caret - 2]) && src[caret - 1] === ' ') {
          e.preventDefault();
          flushTypingSnapshot();
          setLineSource(lineDiv, src.slice(0, caret - 2) + src.slice(caret));
          renderAll();
          setCaretOffsetInLine(lineDiv, caret - 2);
          renderAll();
          pushUndo();
          return;
        }
        // Atomic-delete arrow
        if (caret >= 1 && (src[caret - 1] === '\u2192' || src[caret - 1] === '\u2190')) {
          e.preventDefault();
          flushTypingSnapshot();
          setLineSource(lineDiv, src.slice(0, caret - 1) + src.slice(caret));
          renderAll();
          setCaretOffsetInLine(lineDiv, caret - 1);
          renderAll();
          pushUndo();
          return;
        }
      }
    } else if (sel.rangeCount && !sel.isCollapsed) {
      flushTypingSnapshot();
      setTimeout(() => pushUndo(), 0);
    }
  }
}

/* ---------- Toggle inline formatting (bold / italic / underline) ----------
   tagName ∈ {'b','i','u'}. Source uses <b>...</b> style markers; renderer
   hides them as .md-mark spans. Selection wrapped (or unwrapped if exact
   match); collapsed caret inserts an empty pair. */
function toggleFormatting(tagName) {
  const open = '<' + tagName + '>';
  const close = '</' + tagName + '>';
  flushTypingSnapshot();
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);

  if (range.collapsed) {
    const lineDiv = getLineDiv(range.startContainer);
    if (!lineDiv) return;
    const caret = getCaretOffsetInLine(lineDiv);
    const src = getLineSource(lineDiv);
    setLineSource(lineDiv, src.slice(0, caret) + open + close + src.slice(caret));
    renderAll();
    setCaretOffsetInLine(lineDiv, caret + open.length);
    renderAll();
    pushUndo();
    return;
  }

  const startLine = getLineDiv(range.startContainer);
  const endLine = getLineDiv(range.endContainer);
  if (!startLine || startLine !== endLine) return;
  const src = getLineSource(startLine);
  const startOffset = (() => {
    const r = range.cloneRange();
    r.selectNodeContents(startLine);
    r.setEnd(range.startContainer, range.startOffset);
    return r.toString().length;
  })();
  const endOffset = (() => {
    const r = range.cloneRange();
    r.selectNodeContents(endLine);
    r.setEnd(range.endContainer, range.endOffset);
    return r.toString().length;
  })();

  // Unwrap if selection is exactly bracketed by this tag pair
  if (src.slice(startOffset - open.length, startOffset) === open &&
      src.slice(endOffset, endOffset + close.length) === close) {
    const newSrc = src.slice(0, startOffset - open.length) +
                   src.slice(startOffset, endOffset) +
                   src.slice(endOffset + close.length);
    setLineSource(startLine, newSrc);
    renderAll();
    setCaretOffsetInLine(startLine, endOffset - open.length);
    renderAll();
  } else {
    const newSrc = src.slice(0, startOffset) + open +
                   src.slice(startOffset, endOffset) + close +
                   src.slice(endOffset);
    setLineSource(startLine, newSrc);
    renderAll();
    setCaretOffsetInLine(startLine, endOffset + open.length + close.length);
    renderAll();
  }
  pushUndo();
}

/* ---------- Bullet nest ---------- */
function nestBullet(lineDiv, deeper) {
  const src = getLineSource(lineDiv);
  if (!isBulletChar(src[0]) || src[1] !== ' ') return false;
  const depth = BULLET_GLYPHS.indexOf(src[0]);
  let nd = depth + (deeper ? 1 : -1);
  nd = Math.max(0, Math.min(BULLET_GLYPHS.length - 1, nd));
  const caret = getCaretOffsetInLine(lineDiv);
  setLineSource(lineDiv, BULLET_GLYPHS[nd] + ' ' + src.slice(2));
  setCaretOffsetInLine(lineDiv, caret);
  return true;
}

/* ---------- Delete selection range ---------- */
function deleteSelectionRange() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (range.collapsed) return;
  range.deleteContents();
  Array.from(editor.children).forEach(d => {
    if (!d.innerHTML.trim()) d.innerHTML = '<br>';
  });
}

/* ---------- Auto-convert ---------- */
function autoConvertAroundCaret() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const lineDiv = getLineDiv(range.startContainer);
  if (!lineDiv) return;
  const caret = getCaretOffsetInLine(lineDiv);
  const src = getLineSource(lineDiv);

  if (caret === 2 && src.startsWith('- ')) {
    flushTypingSnapshot();
    setLineSource(lineDiv, '\u2022 ' + src.slice(2));
    setCaretOffsetInLine(lineDiv, 2);
    didAutoConvert = true;
    queueMicrotask(() => pushUndo());
    return;
  }
  if (caret >= 3 && src.slice(caret - 3, caret) === '-> ') {
    flushTypingSnapshot();
    setLineSource(lineDiv, src.slice(0, caret - 3) + '\u2192 ' + src.slice(caret));
    setCaretOffsetInLine(lineDiv, caret - 1);
    didAutoConvert = true;
    queueMicrotask(() => pushUndo());
    return;
  }
  if (caret >= 3 && src.slice(caret - 3, caret) === '<- ') {
    flushTypingSnapshot();
    setLineSource(lineDiv, src.slice(0, caret - 3) + '\u2190 ' + src.slice(caret));
    setCaretOffsetInLine(lineDiv, caret - 1);
    didAutoConvert = true;
    queueMicrotask(() => pushUndo());
    return;
  }
}

/* ---------- Copy / Cut ----------
   Override default copy so the clipboard receives the SOURCE STRING
   (with comment, header, and <b>/<i>/<u> tags intact) rather than the
   visually rendered text. This lets a paste back into Scholia restore
   the original formatting. We don't set text/html so the existing paste
   handler reads our text/plain. */
function getSelectionSource() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  const range = sel.getRangeAt(0);
  if (range.collapsed) return null;
  const startLine = getLineDiv(range.startContainer);
  const endLine = getLineDiv(range.endContainer);
  if (!startLine || !endLine) return null;
  const lines = Array.from(editor.children);
  const startIdx = lines.indexOf(startLine);
  const endIdx = lines.indexOf(endLine);
  if (startIdx === -1 || endIdx === -1) return null;
  const startOffset = (() => {
    const r = range.cloneRange();
    r.selectNodeContents(startLine);
    r.setEnd(range.startContainer, range.startOffset);
    return r.toString().length;
  })();
  const endOffset = (() => {
    const r = range.cloneRange();
    r.selectNodeContents(endLine);
    r.setEnd(range.endContainer, range.endOffset);
    return r.toString().length;
  })();
  if (startIdx === endIdx) {
    return getLineSource(startLine).slice(startOffset, endOffset);
  }
  let out = getLineSource(startLine).slice(startOffset);
  for (let i = startIdx + 1; i < endIdx; i++) {
    out += '\n' + getLineSource(lines[i]);
  }
  out += '\n' + getLineSource(endLine).slice(0, endOffset);
  return out;
}

editor.addEventListener('copy', (e) => {
  const src = getSelectionSource();
  if (src === null) return;
  e.preventDefault();
  e.clipboardData.setData('text/plain', src);
});

editor.addEventListener('cut', (e) => {
  const src = getSelectionSource();
  if (src === null) return;
  e.preventDefault();
  e.clipboardData.setData('text/plain', src);
  flushTypingSnapshot();
  deleteSelectionRange();
  renderAll();
  pushUndo();
});

/* ---------- Paste ---------- */
editor.addEventListener('paste', (e) => {
  e.preventDefault();
  flushTypingSnapshot();
  const html = e.clipboardData.getData('text/html');
  const text = e.clipboardData.getData('text/plain');
  let lines;
  if (html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    sanitizeForPaste(tmp);
    lines = (tmp.textContent || '').split(/\r?\n/);
  } else {
    lines = (text || '').split(/\r?\n/);
  }
  while (lines.length > 1 && lines[lines.length - 1] === '') lines.pop();

  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  if (!sel.isCollapsed) deleteSelectionRange();
  const range = window.getSelection().getRangeAt(0);
  const lineDiv = getLineDiv(range.startContainer);
  if (!lineDiv) return;
  const caret = getCaretOffsetInLine(lineDiv);
  const src = getLineSource(lineDiv);
  const before = src.slice(0, caret);
  const after = src.slice(caret);

  if (lines.length === 1) {
    setLineSource(lineDiv, before + lines[0] + after);
    renderAll();
    setCaretOffsetInLine(lineDiv, (before + lines[0]).length);
    renderAll();
    pushUndo();
    return;
  }
  setLineSource(lineDiv, before + lines[0]);
  let prev = lineDiv;
  for (let i = 1; i < lines.length; i++) {
    const nl = document.createElement('div');
    setIndent(nl, getIndent(lineDiv));
    setLineSource(nl, (i === lines.length - 1) ? lines[i] + after : lines[i]);
    prev.after(nl);
    prev = nl;
  }
  renderAll();
  setCaretOffsetInLine(prev, lines[lines.length - 1].length);
  renderAll();
  pushUndo();
});

function sanitizeForPaste(root) {
  const blockTags = new Set(['DIV','P','LI','BR','H1','H2','H3','H4','H5','H6','BLOCKQUOTE']);
  function process(node) {
    const children = Array.from(node.childNodes);
    for (const child of children) {
      if (child.nodeType !== Node.ELEMENT_NODE) continue;
      if (blockTags.has(child.tagName)) {
        process(child);
        const frag = document.createDocumentFragment();
        while (child.firstChild) frag.appendChild(child.firstChild);
        frag.appendChild(document.createTextNode('\n'));
        node.replaceChild(frag, child);
      } else {
        process(child);
        while (child.firstChild) node.insertBefore(child.firstChild, child);
        node.removeChild(child);
      }
    }
  }
  process(root);
}

/* ---------- Tab Bar ---------- */
const tabbar = document.getElementById('tabbar');

function renderTabBar() {
  tabbar.innerHTML = '';
  appTabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.dataset.id = tab.id;

    const nameSpan = document.createElement('span');
    nameSpan.className = 'tab-name';
    nameSpan.textContent = tab.name;
    el.appendChild(nameSpan);

    el.addEventListener('click', () => {
      if (tab.id === activeTabId) return;
      switchToTab(tab.id);
    });

    nameSpan.addEventListener('dblclick', e => {
      e.stopPropagation();
      startRenameTab(tab.id, nameSpan);
    });

    tabbar.appendChild(el);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'tab-add';
  addBtn.title = 'New tab';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', addNewTab);
  tabbar.appendChild(addBtn);
}

function updateURL() {
  const tab = getActiveTab();
  if (tab) history.replaceState(null, '', '#' + tab.slug);
}

function switchToTab(id) {
  if (id === activeTabId) return;
  const cur = getActiveTab();
  if (cur) captureTabState(cur);
  activeTabId = id;
  applyTabState(getActiveTab());
  undoStack = [];
  redoStack = [];
  pushUndo();
  renderTabBar();
  updateURL();
  editor.focus({ preventScroll: true });
}

function addNewTab() {
  const cur = getActiveTab();
  if (cur) captureTabState(cur);
  const name = 'Tab ' + (appTabs.length + 1);
  const tab = {
    id: genId(), name, slug: slugify(name),
    lines: [{ src: '', indent: 0 }],
    caretLine: 0, caretOffset: 0, scrollTop: 0
  };
  appTabs.push(tab);
  activeTabId = tab.id;
  applyTabState(tab);
  undoStack = [];
  redoStack = [];
  pushUndo();
  renderTabBar();
  updateURL();
  editor.focus({ preventScroll: true });
}

function startRenameTab(id, nameSpan) {
  const tab = appTabs.find(t => t.id === id);
  if (!tab) return;
  const input = document.createElement('input');
  input.className = 'tab-name-input';
  input.value = tab.name;
  nameSpan.replaceWith(input);
  input.focus(); input.select();

  function finish(revert) {
    const newName = revert ? tab.name : (input.value.trim() || tab.name);
    tab.name = newName;
    tab.slug = slugify(newName);
    renderTabBar();
    if (tab.id === activeTabId) updateURL();
    saveState();
  }

  input.addEventListener('blur', () => finish(false));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    else if (e.key === 'Escape') { e.preventDefault(); finish(true); }
  });
}

/* ---------- State Management ---------- */
const STORAGE_KEY = 'scholia_v1';

function genId() {
  return Math.random().toString(36).slice(2, 10);
}

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'tab';
}

function captureTabState(tab) {
  tab.lines = Array.from(editor.children).map(d => ({
    src: getLineSource(d),
    indent: getIndent(d)
  }));
  const sel = window.getSelection();
  let caretLine = 0, caretOffset = 0;
  if (sel.rangeCount) {
    const lineDiv = getLineDiv(sel.getRangeAt(0).startContainer);
    if (lineDiv) {
      caretLine = Array.from(editor.children).indexOf(lineDiv);
      caretOffset = getCaretOffsetInLine(lineDiv);
    }
  }
  tab.caretLine = caretLine;
  tab.caretOffset = caretOffset;
  tab.scrollTop = stage.scrollTop;
}

function applyTabState(tab) {
  editor.innerHTML = '';
  const lines = tab.lines && tab.lines.length ? tab.lines : [{ src: '', indent: 0 }];
  lines.forEach(l => {
    const d = document.createElement('div');
    setIndent(d, l.indent || 0);
    setLineSource(d, l.src || '');
    editor.appendChild(d);
  });
  ensureLine();
  renderAll();
  const cl = tab.caretLine || 0;
  if (editor.children[cl]) {
    setCaretOffsetInLine(editor.children[cl], tab.caretOffset || 0);
  }
  stage.scrollTop = tab.scrollTop || 0;
}

let appTabs = [];
let activeTabId = null;

function getActiveTab() {
  return appTabs.find(t => t.id === activeTabId) || appTabs[0];
}

function saveState() {
  const tab = getActiveTab();
  if (tab) captureTabState(tab);
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      version: 1,
      tabs: appTabs,
      activeTabId,
      editorSize
    }));
  } catch (e) {}
}

// var (not let) so it's hoisted — scheduleSave() may be called before this line executes
var _saveTimer;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveState, 600);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (!state || !Array.isArray(state.tabs) || !state.tabs.length) return false;
    appTabs = state.tabs;
    activeTabId = state.activeTabId || appTabs[0].id;
    // Honor URL hash: if hash matches a tab slug, make that tab active
    const hashSlug = window.location.hash.slice(1);
    if (hashSlug) {
      const bySlug = appTabs.find(t => t.slug === hashSlug);
      if (bySlug) activeTabId = bySlug.id;
    }
    if (typeof state.editorSize === 'number') {
      editorSize = state.editorSize;
      applyFontSize();
    }
    return true;
  } catch (e) {
    return false;
  }
}

function createDefaultTab() {
  const tab = {
    id: genId(),
    name: 'Main',
    slug: 'main',
    lines: [{ src: '', indent: 0 }],
    caretLine: 0,
    caretOffset: 0,
    scrollTop: 0
  };
  appTabs = [tab];
  activeTabId = tab.id;
}

/* ---------- Toolbar ---------- */
document.querySelector('.chrome').addEventListener('mousedown', (e) => {
  const btn = e.target.closest('.tb-btn');
  if (!btn) return;
  e.preventDefault();
  if (btn.dataset.fmt) {
    editor.focus();
    const map = { bold: 'b', italic: 'i', underline: 'u' };
    const tag = map[btn.dataset.fmt];
    if (tag) toggleFormatting(tag);
    return;
  }
  const action = btn.dataset.action;
  if (action === 'undo') doUndo();
  else if (action === 'redo') doRedo();
  else if (action === 'size-up') bumpFontSize(SIZE_STEP);
  else if (action === 'size-down') bumpFontSize(-SIZE_STEP);
  else if (action === 'export') exportBackup();
  else if (action === 'import') document.getElementById('import-input').click();
});

/* ---------- Export / Import ---------- */
function exportBackup() {
  const cur = getActiveTab();
  if (cur) captureTabState(cur);
  const state = { version: 1, tabs: appTabs, activeTabId, editorSize };
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = 'scholia-backup-' + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('import-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const state = JSON.parse(ev.target.result);
      if (!state || !Array.isArray(state.tabs) || !state.tabs.length) throw new Error('invalid');
      appTabs = state.tabs;
      activeTabId = state.activeTabId || state.tabs[0].id;
      if (typeof state.editorSize === 'number') { editorSize = state.editorSize; applyFontSize(); }
      applyTabState(getActiveTab());
      undoStack = [];
      redoStack = [];
      pushUndo();
      renderTabBar();
      updateURL();
      saveState();
      editor.focus({ preventScroll: true });
    } catch (_) {
      alert('Could not restore — file may be corrupted or in wrong format.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

/* ---------- Init ---------- */
if (!loadState()) createDefaultTab();
applyTabState(getActiveTab());
undoStack = [];
redoStack = [];
pushUndo();
renderTabBar();
updateURL();
editor.focus({ preventScroll: true });
</script>
</body>
