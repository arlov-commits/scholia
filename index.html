<!DOCTYPE html>
<!-- v6.2 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="version" content="v6.2">
<title>Scholia — Academic Editor</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='10' fill='%23221c17'/><path d='M44 12 L52 20 L26 46 L18 46 L18 38 Z' fill='%23c9a86a'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #f4ecd8;
    --paper-edge:   #e8dfc8;
    --ink:          #1f1a14;
    --ink-soft:     #4a4036;
    --ink-faint:    #8a7d6c;

    --c-tilde:    #b8627a;
    --c-bang:     #c0392b;
    --c-at:       #3a4a8a;
    --c-dollar:   #b8861b;
    --c-percent:  #6b7a3a;

    --c-tilde-bg:    rgba(184,98,122,0.08);
    --c-bang-bg:     rgba(192,57,43,0.08);
    --c-at-bg:       rgba(58,74,138,0.08);
    --c-dollar-bg:   rgba(184,134,27,0.09);
    --c-percent-bg:  rgba(107,122,58,0.09);

    --c-caret:    #8a7d6c;
    --c-amp:      #8a5a2b;
    --c-dashes:   #a04a3a;
    --c-code:     #2d6e6b;
    --c-bracket:  #3d4a6b;

    --c-caret-bg:   rgba(138,125,108,0.08);
    --c-amp-bg:     rgba(138,90,43,0.08);
    --c-dashes-bg:  rgba(160,74,58,0.08);
    --c-code-bg:    rgba(45,110,107,0.08);
    --c-bracket-bg: rgba(61,74,107,0.07);

    --header:     #2a2218;

    --chrome-bg:    #2a2520;
    --chrome-fg:    #d8cdb8;
    --chrome-accent:#c9a86a;
    --rule:         #cbbfa3;

    --editor-size: 18px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at top, #3a312a 0%, #221c17 60%, #181410 100%);
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--ink);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.035;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: overlay;
  }

  .chrome {
    position: fixed; top: 0; left: 0; right: 0;
    height: 52px;
    background: linear-gradient(180deg, #322b24, #251f1a);
    border-bottom: 1px solid #0c0a08;
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 6px 18px rgba(0,0,0,0.4);
    display: flex; align-items: center;
    padding: 0 22px; gap: 18px;
    z-index: 50;
    font-family: 'Inter', sans-serif;
    color: var(--chrome-fg);
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--chrome-accent);
    margin-right: 6px;
  }
  .brand .dot { color: #8b6f3a; margin: 0 4px; }

  .toolbar { display: flex; gap: 4px; align-items: center; flex-wrap: nowrap; }

  .tb-btn {
    background: transparent;
    color: var(--chrome-fg);
    border: 1px solid transparent;
    border-radius: 4px;
    min-width: 30px; height: 30px;
    padding: 0 8px;
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 120ms ease;
    white-space: nowrap;
  }
  .tb-btn:hover {
    background: rgba(201, 168, 106, 0.12);
    border-color: rgba(201, 168, 106, 0.3);
    color: var(--chrome-accent);
  }
  .tb-btn.active {
    background: rgba(201, 168, 106, 0.22);
    border-color: rgba(201, 168, 106, 0.45);
    color: var(--chrome-accent);
  }
  .tb-btn b { font-weight: 700; }
  .tb-btn i { font-style: italic; }
  .tb-btn u { text-decoration: underline; text-underline-offset: 2px; }
  .tb-btn.icon { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; }

  .tb-sep {
    width: 1px; height: 22px;
    background: rgba(216, 205, 184, 0.15);
    margin: 0 6px;
  }

  .size-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(216, 205, 184, 0.75);
    min-width: 32px;
    text-align: center;
    letter-spacing: 0.04em;
  }

  .legend {
    margin-left: auto;
    display: flex; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(216, 205, 184, 0.5);
  }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .legend .swatch {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
  }

  .stage {
    position: absolute;
    top: 52px; bottom: 28px; left: 0; right: 0;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .page {
    width: 100%;
    min-height: 100%;
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(255,250,235,0.5), transparent 60%),
      radial-gradient(ellipse at 85% 90%, rgba(180,150,100,0.08), transparent 60%);
    box-shadow:
      0 1px 0 var(--paper-edge) inset,
      0 -1px 0 rgba(0,0,0,0.06) inset;
    padding: 40px 56px 80px;
    position: relative;
  }

  .page::before {
    content: '';
    position: absolute;
    top: 18px; left: 56px; right: 56px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rule) 20%, var(--rule) 80%, transparent);
    opacity: 0.5;
  }

  #editor {
    outline: none;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: var(--editor-size);
    line-height: 1.7;
    color: var(--ink);
    min-height: 70vh;
    white-space: pre-wrap;
    word-wrap: break-word;
    caret-color: var(--ink);
    -webkit-font-feature-settings: "kern", "liga", "onum";
    font-feature-settings: "kern", "liga", "onum";
  }

  #editor::selection,
  #editor *::selection {
    background: rgba(201, 168, 106, 0.45);
    color: var(--ink);
  }

  #editor > div {
    padding-left: calc(var(--indent, 0) * 2.2em);
    min-height: 1.7em;
    position: relative;
  }

  /* ====== Headers ====== */
  .h1, .h2, .h3 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--header);
    line-height: 1.3;
    display: inline;
  }
  .h1 { font-size: 1.85em; font-weight: 600; letter-spacing: -0.01em; }
  .h2 { font-size: 1.45em; font-weight: 600; }
  .h3 { font-size: 1.2em;  font-weight: 600; font-style: italic; color: var(--ink-soft); }

  div.line-h1 { margin-top: 0.6em; margin-bottom: 0.2em; }
  div.line-h2 { margin-top: 0.4em; margin-bottom: 0.1em; }
  div.line-h3 { margin-top: 0.3em; }

  /* Header marker — visible only when caret is on the header line */
  .h-mark {
    display: none;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
    font-size: 0.5em;
    margin-right: 0.35em;
    vertical-align: 0.18em;
  }
  div.line-h.raw .h-mark { display: inline; }

  /* ====== Comments ====== */
  .cmt {
    padding: 0 4px;
    border-radius: 3px;
  }
  .cmt-tilde   { color: var(--c-tilde);   background: var(--c-tilde-bg); }
  .cmt-bang    { color: var(--c-bang);    background: var(--c-bang-bg);    font-weight: 500; }
  .cmt-at      { color: var(--c-at);      background: var(--c-at-bg); }
  .cmt-dollar  { color: var(--c-dollar);  background: var(--c-dollar-bg); }
  .cmt-percent { color: var(--c-percent); background: var(--c-percent-bg); }

  .cmt-caret {
    color: var(--c-caret); background: var(--c-caret-bg);
    font-size: 0.82em;
    vertical-align: 0.18em;
  }
  .cmt-amp {
    color: var(--c-amp); background: var(--c-amp-bg);
    font-variant: small-caps;
    letter-spacing: 0.04em;
  }
  .cmt-dashes {
    color: var(--c-dashes); background: var(--c-dashes-bg);
    text-decoration: line-through;
    text-decoration-color: rgba(160, 74, 58, 0.5);
  }
  .cmt-code {
    color: var(--c-code); background: var(--c-code-bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9em;
  }
  .cmt-bracket {
    color: var(--c-bracket); background: var(--c-bracket-bg);
  }

  /* ====== Markers ======
     Default rule: COLLAPSED (display: none). Markers reappear faded
     when:
       - the comment is OPEN (no closer yet) — opener marker shown
       - the caret is INSIDE the comment span — both markers shown faded
     Bracket markers always visible (special case). */
  .marker {
    display: none;
    color: inherit;
    opacity: 0.45;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82em;
    font-weight: 500;
  }
  /* Opener visible when comment is open OR caret inside */
  .cmt.open > .marker.marker-open,
  .cmt.raw  > .marker {
    display: inline;
  }
  .cmt-bracket > .marker {
    display: inline;
    opacity: 0.7;
    font-family: inherit;
    font-size: inherit;
  }
  .cmt-bracket.raw > .marker { opacity: 1; }

  /* Markdown formatting markers — ALWAYS hidden (per spec) */
  .md-mark { display: none; }
  .md-bold      { font-weight: 700; }
  .md-italic    { font-style: italic; }
  .md-underline { text-decoration: underline; text-underline-offset: 2px; }

  /* Lists */
  .bullet, .num {
    display: inline-block;
    color: var(--ink-soft);
    margin-right: 0.5em;
    font-weight: 500;
    user-select: none;
  }
  .num { min-width: 1.5em; text-align: right; }

  /* Arrows */
  .arrow {
    display: inline-block;
    font-family: 'EB Garamond', serif;
    font-weight: 500;
    color: var(--ink-soft);
    padding: 0 1px;
  }

  .status {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 28px;
    background: linear-gradient(180deg, #251f1a, #1a1612);
    border-top: 1px solid #0c0a08;
    color: rgba(216, 205, 184, 0.55);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    display: flex; align-items: center;
    padding: 0 22px; gap: 18px;
    z-index: 50;
  }
  .status .ind { color: var(--chrome-accent); }

  #editor:empty::before,
  #editor > div:only-child:empty::before {
    content: attr(data-placeholder);
    color: var(--ink-faint);
    font-style: italic;
    pointer-events: none;
  }

  .stage::-webkit-scrollbar { width: 10px; }
  .stage::-webkit-scrollbar-track { background: transparent; }
  .stage::-webkit-scrollbar-thumb {
    background: rgba(201, 168, 106, 0.2);
    border-radius: 5px;
  }
  .stage::-webkit-scrollbar-thumb:hover { background: rgba(201, 168, 106, 0.35); }
</style>
</head>
<body>

<div class="chrome">
  <div class="brand">Scholia<span class="dot">·</span></div>
  <div class="toolbar" id="toolbar">
    <button class="tb-btn" data-fmt="bold" title="Bold (Ctrl+B)"><b>B</b></button>
    <button class="tb-btn" data-fmt="italic" title="Italic (Ctrl+I)"><i>I</i></button>
    <button class="tb-btn" data-fmt="underline" title="Underline (Ctrl+U)"><u>U</u></button>
    <div class="tb-sep"></div>
    <button class="tb-btn icon" data-action="undo" title="Undo (Ctrl+Z)">↶</button>
    <button class="tb-btn icon" data-action="redo" title="Redo (Ctrl+Y / Ctrl+Shift+Z)">↷</button>
    <div class="tb-sep"></div>
    <button class="tb-btn icon" data-action="size-down" title="Decrease font size (Ctrl+−)">A−</button>
    <span class="size-display" id="size-display">18</span>
    <button class="tb-btn icon" data-action="size-up" title="Increase font size (Ctrl+=)">A+</button>
  </div>
  <div class="legend">
    <span><span class="swatch" style="background:var(--c-tilde)"></span>~</span>
    <span><span class="swatch" style="background:var(--c-bang)"></span>!</span>
    <span><span class="swatch" style="background:var(--c-at)"></span>@</span>
    <span><span class="swatch" style="background:var(--c-dollar)"></span>$</span>
    <span><span class="swatch" style="background:var(--c-percent)"></span>%</span>
  </div>
</div>

<div class="stage">
  <div class="page">
    <div id="editor" contenteditable="true" spellcheck="true" data-placeholder="Begin writing. Comments: ~ ! @ $ % ^ & -- /* */ [ ]. Headers: #h1, ##h2, ###h3. All open spans close on Enter, Tab, or another opener."></div>
  </div>
</div>

<div class="status">
  <span>indent: <span class="ind" id="st-indent">0</span></span>
  <span>line: <span class="ind" id="st-line">1</span></span>
  <span style="margin-left:auto">⇥ closes / nests / indents · ↵ closes all open spans · ⇧↵ line break, no close · -&gt; → → · - → •</span>
  <span style="margin-left:18px;opacity:0.4">v6.2</span>
</div>

<script>
/* =====================================================================
   SCHOLIA — Academic Editor v6.2
   ---------------------------------------------------------------------
   PRINCIPLE
   ---------
   Source-of-truth: each line div's textContent is the raw source string.
   Bold/italic/underline are stored as **bold**, *italic*, __underline__
   IN THE SOURCE STRING. Markers are NEVER visible to the user
   (display:none always).

   Comments and headers are "spans" with an opener and closer.
   - While a span is OPEN (no closer), the opener is visible (faded).
   - When CLOSED, the opener hides (and stays hidden) unless the caret
     re-enters that span.
   - Any opener typed mid-span auto-closes the current and starts a new
     one. We render this as: existing-content [closer] [space] [new opener].
     User types `@hello!` and the source becomes `@hello@ !`. Visually:
     [@hello] [!] (space between).
   - Tab → inserts closers for any open spans on the current line, at
     the caret position.
   - Enter (paragraph) → inserts closers for any open spans, then splits.
   - Shift+Enter (line break) → inserts a newline within the SAME line
     div without auto-closing. (We model this as a literal \n in the
     source string. Render-time, \n becomes <br>.)
   - Bracket [ ] is special: markers ALWAYS visible. Inside brackets,
     other comments may nest. Brackets close on ].
   ===================================================================== */

const editor = document.getElementById('editor');
const stIndent = document.getElementById('st-indent');
const stLine = document.getElementById('st-line');
const sizeDisplay = document.getElementById('size-display');

/* ---------- Font size ---------- */
const SIZE_MIN = 12, SIZE_MAX = 32, SIZE_STEP = 1;
let editorSize = 18;
function applyFontSize() {
  document.documentElement.style.setProperty('--editor-size', editorSize + 'px');
  sizeDisplay.textContent = String(editorSize);
}
function bumpFontSize(d) {
  editorSize = Math.max(SIZE_MIN, Math.min(SIZE_MAX, editorSize + d));
  applyFontSize();
}
applyFontSize();

/* ---------- Initial line ---------- */
function ensureLine() {
  if (editor.children.length === 0) {
    const d = document.createElement('div');
    d.setAttribute('data-indent', '0');
    d.style.setProperty('--indent', '0');
    d.appendChild(document.createElement('br'));
    editor.appendChild(d);
  }
}
ensureLine();

/* ---------- Caret utilities ---------- */
function getLineDiv(node) {
  while (node && node !== editor) {
    if (node.parentNode === editor) return node;
    node = node.parentNode;
  }
  return null;
}

function getCaretOffsetInLine(lineDiv) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return 0;
  const range = sel.getRangeAt(0);
  if (!lineDiv.contains(range.startContainer) && lineDiv !== range.startContainer) return 0;
  const pre = range.cloneRange();
  pre.selectNodeContents(lineDiv);
  pre.setEnd(range.startContainer, range.startOffset);
  return pre.toString().length;
}

function setCaretOffsetInLine(lineDiv, offset) {
  const sel = window.getSelection();
  const range = document.createRange();
  let remaining = offset;
  let found = false;
  function walk(node) {
    if (found) return;
    if (node.nodeType === Node.TEXT_NODE) {
      const len = node.nodeValue.length;
      if (remaining <= len) {
        range.setStart(node, remaining);
        range.collapse(true);
        found = true;
        return;
      }
      remaining -= len;
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      if (node.tagName === 'BR') {
        // br counts as 1 character (the \n in source)
        if (remaining === 0) {
          range.setStartBefore(node);
          range.collapse(true);
          found = true;
          return;
        }
        remaining -= 1;
        return;
      }
      for (const child of node.childNodes) {
        walk(child);
        if (found) return;
      }
    }
  }
  walk(lineDiv);
  if (!found) {
    range.selectNodeContents(lineDiv);
    range.collapse(false);
  }
  sel.removeAllRanges();
  sel.addRange(range);
}

/* Source-of-truth: textContent BUT we need to preserve \n for shift+enter
   line breaks. textContent serializes <br> as nothing, so we use a custom
   walker. */
function getLineSource(lineDiv) {
  let out = '';
  function walk(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      out += node.nodeValue;
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      if (node.tagName === 'BR') { out += '\n'; return; }
      for (const c of node.childNodes) walk(c);
    }
  }
  walk(lineDiv);
  return out;
}

/* ---------- Comment registry ---------- */
const SINGLE_CHAR_COMMENTS = [
  { ch: '~', cls: 'cmt-tilde' },
  { ch: '!', cls: 'cmt-bang' },
  { ch: '@', cls: 'cmt-at' },
  { ch: '$', cls: 'cmt-dollar' },
  { ch: '%', cls: 'cmt-percent' },
  { ch: '^', cls: 'cmt-caret' },
  { ch: '&', cls: 'cmt-amp' }
];
const SINGLE_CHAR_SET = new Set(SINGLE_CHAR_COMMENTS.map(c => c.ch));
function clsForSingleChar(ch) {
  const c = SINGLE_CHAR_COMMENTS.find(x => x.ch === ch);
  return c ? c.cls : null;
}

/* Detect an opener at position i in src. Returns {len, kind, ch?, cls}. */
function openerAt(src, i) {
  const c = src[i];
  if (SINGLE_CHAR_SET.has(c)) return { len: 1, kind: 'single', ch: c, cls: clsForSingleChar(c), open: c, close: c };
  if (c === '[') return { len: 1, kind: 'bracket', cls: 'cmt-bracket', open: '[', close: ']' };
  if (c === '/' && src[i+1] === '*') return { len: 2, kind: 'code', cls: 'cmt-code', open: '/*', close: '*/' };
  if (c === '-' && src[i+1] === '-') return { len: 2, kind: 'dashes', cls: 'cmt-dashes', open: '--', close: '--' };
  return null;
}

/* Detect closer for a given opener at position i. Returns len if matched. */
function closerLenAt(src, i, opener) {
  if (opener.kind === 'single' || opener.kind === 'bracket') {
    return src[i] === opener.close ? 1 : 0;
  }
  if (opener.kind === 'code') {
    return (src[i] === '*' && src[i+1] === '/') ? 2 : 0;
  }
  if (opener.kind === 'dashes') {
    return (src[i] === '-' && src[i+1] === '-') ? 2 : 0;
  }
  return 0;
}

/* ---------- Markdown formatting (bold, italic, underline) ----------
   In source: **bold**, *italic*, __underline__.
   Markers are display:none, never visible.
   We tokenize these inline within text segments. */

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* Render plain text, converting arrow/bullet glyphs to atomic spans
   and \n to <br>. Also processes markdown formatting. */
function renderTextSegment(s) {
  // We process **bold**, __underline__, then *italic*, recursively.
  return processFormatting(s);
}

function processFormatting(s) {
  // Try bold first (longest), then underline, then italic
  // Use a simple recursive descent.
  let out = '';
  let i = 0;
  const n = s.length;
  while (i < n) {
    const ch = s[i];
    // **bold**
    if (ch === '*' && s[i+1] === '*') {
      const close = s.indexOf('**', i + 2);
      if (close !== -1 && close > i + 2) {
        const inner = s.slice(i + 2, close);
        out += `<span class="md md-bold"><span class="md-mark">**</span>${processFormatting(inner)}<span class="md-mark">**</span></span>`;
        i = close + 2;
        continue;
      }
    }
    // __underline__
    if (ch === '_' && s[i+1] === '_') {
      const close = s.indexOf('__', i + 2);
      if (close !== -1 && close > i + 2) {
        const inner = s.slice(i + 2, close);
        out += `<span class="md md-underline"><span class="md-mark">__</span>${processFormatting(inner)}<span class="md-mark">__</span></span>`;
        i = close + 2;
        continue;
      }
    }
    // *italic* (single *, not part of **)
    if (ch === '*' && s[i+1] !== '*' && s[i-1] !== '*') {
      // find single * close, not adjacent to another *
      let k = i + 1;
      let close = -1;
      while (k < n) {
        if (s[k] === '*' && s[k+1] !== '*' && s[k-1] !== '*') { close = k; break; }
        k++;
      }
      if (close !== -1 && close > i + 1) {
        const inner = s.slice(i + 1, close);

      // closedByOpener means we hit another opener (no closer); that's still
      // "open" in source terms but visually the span ends here.
      // For visual style: if no MATCHING closer exists, it's open (opener
      // marker should remain visible).

}

/* ---------- Bullet / numbered prefix ---------- */
const BULLET_GLYPHS = ['\u2022', '\u25E6', '\u25AA'];

  // - Source starts with one or more #'s up to 3, then content.
  // - "#" alone or "##" alone with nothing after → not yet a header (just typing)
  // - "#x", "##x", "###x" → header level 1/2/3
  // - Trailing close marker (a single # at the very end) is allowed but optional
  let i = 0;

  if (i === src.length) return null;       // just "#" or "##" or "###"
  if (src[i] === '#') return null;          // "####..." not supported

  let contentEnd = src.length;

/* ---------- Tokenize one line ---------- */

    const hashes = '#'.repeat(hdr.level);

    const trailing = hdr.contentEnd < src.length
      ? `<span class="h-mark">${'#'}</span>` : '';

    return `<span class="bullet">${src[0]}</span> ${tokenizeBody(src, 2, src.length)}`;

    return `<span class="num">${escapeHtml(nm[0].trimEnd())}</span> ${tokenizeBody(src, nm[0].length, src.length)}`;

/* ---------- Render ---------- */

  if (sel.rangeCount) {
    const lineDiv = getLineDiv(sel.getRangeAt(0).startContainer);
    if (lineDiv) {
      activeIndex = Array.from(editor.children).indexOf(lineDiv);
      activeOffset = getCaretOffsetInLine(lineDiv);
    }
  }

  Array.from(editor.children).forEach(line => {
    const html = tokenizeLineHTML(line);
    if (line.innerHTML !== html) line.innerHTML = html;

  if (activeIndex >= 0 && editor.children[activeIndex]) {
    const lineDiv = editor.children[activeIndex];
    setCaretOffsetInLine(lineDiv, activeOffset);

  if (!lineDiv) return;

  }
  const sel = window.getSelection();
  if (!sel.rangeCount) return;

      if (node.classList.contains('md-italic')) hasItalic = true;

/* ---------- Indent ---------- */

/* ---------- "What's open at this caret position?" ----------

    const opener = openerAt(src, i);
    if (opener) {
      // Peek: does this span close before caret?
      let k = i + opener.len;
      let endIdx = -1;
      while (k < caret) {
        const cl = closerLenAt(src, k, opener);
        if (cl > 0) { endIdx = k + cl; break; }
        if (opener.kind !== 'bracket' && src[k] === ']') { endIdx = k; break; }
        // Another opener ends non-bracket spans
        if (opener.kind !== 'bracket' && opener.kind !== 'code') {
          const oth = openerAt(src, k);
          if (oth) { endIdx = k; break; }
        }
        k++;
      }
      if (endIdx === -1) {

        return { opener, openIdx: i };

      i = endIdx;

}

/* List ALL unclosed openers on a line, in order, as of position `pos`.
   For closing-on-Enter or Tab: insert each closer in reverse. */

  const opens = [];
  let i = 0;
  while (i < pos) {
    const opener = openerAt(src, i);
    if (opener) {
      // Check if it has a matching closer before pos
      let k = i + opener.len;
      let closed = false;
      while (k < pos) {
        const cl = closerLenAt(src, k, opener);
        if (cl > 0) { closed = true; k += cl; break; }
        if (opener.kind !== 'bracket' && src[k] === ']') { closed = true; break; }
        if (opener.kind !== 'bracket' && opener.kind !== 'code') {
          const oth = openerAt(src, k);
          if (oth) { closed = true; break; }   // closed by another opener
        }
        k++;
      }
      if (!closed) {
        opens.push({ opener, openIdx: i });
        i += opener.len;
      } else {

/* ---------- Undo/Redo ---------- */

    const lineDiv = getLineDiv(sel.getRangeAt(0).startContainer);
    if (lineDiv) {
      activeIndex = Array.from(editor.children).indexOf(lineDiv);
      activeOffset = getCaretOffsetInLine(lineDiv);
    }
  }

pushUndo();

/* ---------- Input ---------- */
let didAutoConvert = false;

          e.preventDefault();
          flushTypingSnapshot();
          setLineSource(lineDiv, src.slice(0, caret - 1) + src.slice(caret));
          renderAll();
          setCaretOffsetInLine(lineDiv, caret - 1);
          renderAll();
          pushUndo();
          return;
        }
      }
    } else if (sel.rangeCount && !sel.isCollapsed) {
      flushTypingSnapshot();
      setTimeout(() => pushUndo(), 0);
    }
  }
}

/* ---------- Wrap selection with markdown markers ---------- */
function wrapSelection(open, close) {
  flushTypingSnapshot();
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);

  if (range.collapsed) {
    const lineDiv = getLineDiv(range.startContainer);
    if (!lineDiv) return;
    const caret = getCaretOffsetInLine(lineDiv);
    const src = getLineSource(lineDiv);
    setLineSource(lineDiv, src.slice(0, caret) + open + close + src.slice(caret));
    renderAll();
    setCaretOffsetInLine(lineDiv, caret + open.length);
    renderAll();
    pushUndo();
    return;
  }
  const startLine = getLineDiv(range.startContainer);
  const endLine = getLineDiv(range.endContainer);
  if (!startLine || startLine !== endLine) return;
  const startOffset = (() => {
    const r = range.cloneRange();
    r.selectNodeContents(startLine);
    r.setEnd(range.startContainer, range.startOffset);
    return r.toString().length;
  })();
  const endOffset = (() => {
    const r = range.cloneRange();
    r.selectNodeContents(endLine);
    r.setEnd(range.endContainer, range.endOffset);
    return r.toString().length;
  })();
  const src = getLineSource(startLine);
  const inner = src.slice(startOffset, endOffset);
  setLineSource(startLine, src.slice(0, startOffset) + open + inner + close + src.slice(endOffset));
  renderAll();
  setCaretOffsetInLine(startLine, endOffset + open.length + close.length);
  renderAll();
  pushUndo();
}

/* ---------- Bullet nest ---------- */
function nestBullet(lineDiv, deeper) {
  const src = getLineSource(lineDiv);
  if (!isBulletChar(src[0]) || src[1] !== ' ') return false;
  const depth = BULLET_GLYPHS.indexOf(src[0]);
  let nd = depth + (deeper ? 1 : -1);
  nd = Math.max(0, Math.min(BULLET_GLYPHS.length - 1, nd));
  const caret = getCaretOffsetInLine(lineDiv);
  setLineSource(lineDiv, BULLET_GLYPHS[nd] + ' ' + src.slice(2));
  setCaretOffsetInLine(lineDiv, caret);
  return true;
}

/* ---------- Delete selection range ---------- */
function deleteSelectionRange() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (range.collapsed) return;
  range.deleteContents();
  Array.from(editor.children).forEach(d => {
    if (!d.innerHTML.trim()) d.innerHTML = '<br>';
  });
}

/* ---------- Auto-convert ---------- */
function autoConvertAroundCaret() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const lineDiv = getLineDiv(range.startContainer);
  if (!lineDiv) return;
  const caret = getCaretOffsetInLine(lineDiv);
  const src = getLineSource(lineDiv);

  if (caret === 2 && src.startsWith('- ')) {
    flushTypingSnapshot();
    setLineSource(lineDiv, '\u2022 ' + src.slice(2));
    setCaretOffsetInLine(lineDiv, 2);
    didAutoConvert = true;
    queueMicrotask(() => pushUndo());
    return;
  }
  if (caret >= 3 && src.slice(caret - 3, caret) === '-> ') {
    flushTypingSnapshot();
    setLineSource(lineDiv, src.slice(0, caret - 3) + '\u2192 ' + src.slice(caret));
    setCaretOffsetInLine(lineDiv, caret - 1);
    didAutoConvert = true;
    queueMicrotask(() => pushUndo());
    return;
  }
  if (caret >= 3 && src.slice(caret - 3, caret) === '<- ') {
    flushTypingSnapshot();
    setLineSource(lineDiv, src.slice(0, caret - 3) + '\u2190 ' + src.slice(caret));
    setCaretOffsetInLine(lineDiv, caret - 1);
    didAutoConvert = true;
    queueMicrotask(() => pushUndo());
    return;
  }
}

/* ---------- Paste ---------- */
editor.addEventListener('paste', (e) => {
  e.preventDefault();
  flushTypingSnapshot();
  const html = e.clipboardData.getData('text/html');
  const text = e.clipboardData.getData('text/plain');
  let lines;
  if (html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    sanitizeForPaste(tmp);
    lines = (tmp.textContent || '').split(/\r?\n/);
  } else {
    lines = (text || '').split(/\r?\n/);
  }
  while (lines.length > 1 && lines[lines.length - 1] === '') lines.pop();

  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  if (!sel.isCollapsed) deleteSelectionRange();
  const range = window.getSelection().getRangeAt(0);
  const lineDiv = getLineDiv(range.startContainer);
  if (!lineDiv) return;
  const caret = getCaretOffsetInLine(lineDiv);
  const src = getLineSource(lineDiv);
  const before = src.slice(0, caret);
  const after = src.slice(caret);

  if (lines.length === 1) {
    setLineSource(lineDiv, before + lines[0] + after);
    renderAll();
    setCaretOffsetInLine(lineDiv, (before + lines[0]).length);
    renderAll();
    pushUndo();
    return;
  }
  setLineSource(lineDiv, before + lines[0]);
  let prev = lineDiv;
  for (let i = 1; i < lines.length; i++) {
    const nl = document.createElement('div');
    setIndent(nl, getIndent(lineDiv));
    setLineSource(nl, (i === lines.length - 1) ? lines[i] + after : lines[i]);
    prev.after(nl);
    prev = nl;
  }
  renderAll();
  setCaretOffsetInLine(prev, lines[lines.length - 1].length);
  renderAll();
  pushUndo();
});

function sanitizeForPaste(root) {
  const blockTags = new Set(['DIV','P','LI','BR','H1','H2','H3','H4','H5','H6','BLOCKQUOTE']);
  function process(node) {
    const children = Array.from(node.childNodes);
    for (const child of children) {
      if (child.nodeType !== Node.ELEMENT_NODE) continue;
      if (blockTags.has(child.tagName)) {
        process(child);
        const frag = document.createDocumentFragment();
        while (child.firstChild) frag.appendChild(child.firstChild);
        frag.appendChild(document.createTextNode('\n'));
        node.replaceChild(frag, child);
      } else {
        process(child);
        while (child.firstChild) node.insertBefore(child.firstChild, child);
        node.removeChild(child);
      }
    }
  }
  process(root);
}

/* ---------- Toolbar ---------- */
document.getElementById('toolbar').addEventListener('mousedown', (e) => {
  const btn = e.target.closest('.tb-btn');
  if (!btn) return;
  e.preventDefault();
  if (btn.dataset.fmt) {
    editor.focus();
    const map = { bold: ['**','**'], italic: ['*','*'], underline: ['__','__'] };
    const m = map[btn.dataset.fmt];
    if (m) wrapSelection(m[0], m[1]);
    return;
  }
  const action = btn.dataset.action;
  if (action === 'undo') doUndo();
  else if (action === 'redo') doRedo();
  else if (action === 'size-up') bumpFontSize(SIZE_STEP);
  else if (action === 'size-down') bumpFontSize(-SIZE_STEP);
});

/* ---------- Init ---------- */
renderAll();
editor.focus();
</script>
</body>
